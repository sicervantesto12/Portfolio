<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference — a calmer way to collect visual ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F5;
    --paper-raised:#FFFFFF;
    --ink:#1B1A18;
    --ink-soft:#5C5A54;
    --line:#E7E4DB;
    --coral:#F0466B;
    --coral-deep:#C22F52;
    --sage:#7C8B6F;
    --gold:#C99A3D;
    --radius:14px;
    --shadow: 0 1px 2px rgba(27,26,24,0.04), 0 8px 24px -12px rgba(27,26,24,0.18);
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--coral); color:#fff; }
  a{ color:inherit; }

  /* Visible focus ring everywhere, respecting keyboard users */
  :focus-visible{
    outline: 2.5px solid var(--coral-deep);
    outline-offset: 2px;
    border-radius: 6px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
  }

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:40;
    background:rgba(250,249,245,0.92);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1400px; margin:0 auto;
    padding:16px 28px 0;
  }
  .row-top{
    display:flex; align-items:center; gap:20px;
  }
  .logo{
    font-family:'Fraunces', serif;
    font-weight:600; font-size:22px;
    letter-spacing:-0.01em;
    display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .logo .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--coral);
    display:inline-block;
    transform: translateY(-1px);
  }

  .search-wrap{
    flex:1;
    max-width:640px;
    position:relative;
  }
  .search-wrap svg{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    opacity:0.5; pointer-events:none;
  }
  #search{
    width:100%;
    padding:11px 16px 11px 42px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper-raised);
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--ink);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  #search::placeholder{ color:var(--ink-soft); }
  #search:focus{
    border-color:var(--coral);
    box-shadow:0 0 0 4px rgba(240,70,107,0.12);
    outline:none;
  }
  .clear-btn{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:26px;height:26px; border-radius:50%; border:none;
    background:var(--line); color:var(--ink-soft);
    cursor:pointer; display:none; align-items:center; justify-content:center;
    font-size:14px; line-height:1;
  }
  .clear-btn.show{ display:flex; }
  .clear-btn:hover{ background:#DCD8CC; }

  .saved-toggle{
    display:flex; align-items:center; gap:8px;
    padding:9px 16px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper-raised);
    font-size:14px; font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition: border-color .15s ease, background .15s ease, color .15s ease;
  }
  .saved-toggle svg{ width:16px; height:16px; }
  .saved-toggle .count{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    background:var(--line);
    padding:1px 7px;
    border-radius:999px;
  }
  .saved-toggle.active{
    background:var(--ink);
    border-color:var(--ink);
    color:var(--paper);
  }
  .saved-toggle.active .count{ background:rgba(255,255,255,0.18); color:var(--paper); }
  .saved-toggle:hover{ border-color:var(--ink); }

  /* ---------- Category pills ---------- */
  .pills{
    display:flex; gap:8px;
    padding:14px 0 14px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .pills::-webkit-scrollbar{ display:none; }
  .pill{
    flex:0 0 auto;
    padding:7px 15px;
    border-radius:999px;
    border:1.5px solid transparent;
    background:transparent;
    color:var(--ink-soft);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .pill:hover{ background:var(--line); color:var(--ink); }
  .pill.active{
    background:var(--ink); color:var(--paper); border-color:var(--ink);
  }

  /* ---------- Result meta ---------- */
  .meta-row{
    max-width:1400px; margin:0 auto;
    padding:2px 28px 18px;
    display:flex; align-items:baseline; justify-content:space-between;
    gap:12px; flex-wrap:wrap;
  }
  .meta-row h1{
    font-family:'Fraunces', serif;
    font-weight:500; font-style:italic;
    font-size:19px;
    margin:0;
    color:var(--ink-soft);
  }
  .meta-row h1 b{
    font-style:normal; font-weight:600; color:var(--ink);
  }
  .sort{
    font-size:13px; color:var(--ink-soft);
    display:flex; align-items:center; gap:8px;
  }
  .sort select{
    border:1.5px solid var(--line);
    background:var(--paper-raised);
    border-radius:8px;
    padding:6px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    color:var(--ink);
  }

  /* ---------- Masonry grid ---------- */
  main{
    max-width:1400px; margin:0 auto;
    padding:0 24px 80px;
  }
  .grid{
    column-count:5;
    column-gap:16px;
  }
  @media (max-width:1300px){ .grid{ column-count:4; } }
  @media (max-width:1000px){ .grid{ column-count:3; } }
  @media (max-width:720px){ .grid{ column-count:2; } .header-inner{padding:14px 16px 0;} main{padding:0 12px 60px;} }
  @media (max-width:460px){ .grid{ column-count:1; } .row-top{flex-wrap:wrap; row-gap:10px;} }

  .card{
    break-inside:avoid;
    margin-bottom:16px;
    border-radius:var(--radius);
    overflow:hidden;
    position:relative;
    background:var(--paper-raised);
    box-shadow: var(--shadow);
    cursor:pointer;
    animation: rise .5s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .card img{
    width:100%; display:block;
    transition: transform .5s cubic-bezier(.2,.7,.3,1);
  }
  .card:hover img{ transform:scale(1.045); }

  .card-overlay{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    opacity:0; transition:opacity .2s ease;
    display:flex; flex-direction:column; justify-content:space-between;
    padding:10px;
  }
  .card:hover .card-overlay, .card:focus-within .card-overlay{ opacity:1; }

  .card-top{ display:flex; justify-content:flex-end; }

  /* Signature element: ticket-stub save tag, tears off when saved */
  .ticket{
    position:relative;
    display:flex; align-items:center; gap:6px;
    background:var(--paper-raised);
    color:var(--ink);
    border:none;
    padding:7px 12px 7px 10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    font-weight:500;
    border-radius:3px;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    transform: rotate(-3deg);
    transition: transform .18s ease, background .18s ease, color .18s ease;
  }
  .ticket::before{
    content:"";
    position:absolute; left:-5px; top:50%; transform:translateY(-50%);
    width:9px; height:9px; border-radius:50%;
    background:var(--paper);
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .ticket:hover{ transform: rotate(0deg) scale(1.04); }
  .ticket.saved{
    background:var(--coral); color:#fff;
    transform: rotate(4deg);
  }
  .ticket svg{ width:13px; height:13px; }

  .card-bottom{ color:#fff; }
  .card-title{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:14.5px;
    line-height:1.25;
    margin:0 0 3px;
    text-shadow:0 1px 4px rgba(0,0,0,0.4);
  }
  .card-tag{
    font-size:11px;
    font-family:'IBM Plex Mono', monospace;
    opacity:0.85;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }

  /* Empty state */
  .empty{
    max-width:420px; margin:60px auto; text-align:center;
    padding:0 20px;
  }
  .empty .glyph{
    font-family:'Fraunces', serif;
    font-style:italic; font-size:44px;
    color:var(--line);
    margin-bottom:6px;
  }
  .empty h2{ font-family:'Fraunces', serif; font-weight:500; font-size:21px; margin:0 0 8px; }
  .empty p{ color:var(--ink-soft); font-size:14.5px; line-height:1.5; margin:0 0 18px; }
  .empty button{
    border:1.5px solid var(--ink); background:var(--ink); color:var(--paper);
    padding:9px 18px; border-radius:999px; font-size:13.5px; font-weight:600; cursor:pointer;
  }

  .sr-only{
    position:absolute; width:1px;height:1px; padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  footer{
    text-align:center; padding:30px 20px 50px;
    color:var(--ink-soft); font-size:12.5px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="row-top">
      <div class="logo"><span class="dot"></span>Reference</div>

      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <label for="search" class="sr-only">Search saved and discovered images</label>
        <input id="search" type="text" placeholder="Search by mood, subject, or color…" autocomplete="off">
        <button class="clear-btn" id="clearSearch" aria-label="Clear search">✕</button>
      </div>

      <button class="saved-toggle" id="savedToggle" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>
        Saved <span class="count" id="savedCount">0</span>
      </button>
    </div>

    <nav class="pills" aria-label="Filter by category" id="pills"></nav>
  </div>
</header>

<div class="meta-row">
  <h1 id="resultHeading"><b>128</b> images to browse</h1>
  <div class="sort">
    Sort by
    <select id="sortSelect">
      <option value="curated">Curated order</option>
      <option value="az">Title, A–Z</option>
      <option value="tall">Tallest first</option>
    </select>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <div class="glyph">”</div>
    <h2>Nothing here yet</h2>
    <p id="emptyText">No images match that search. Try a different word, or clear your filters to see everything again.</p>
    <button id="resetBtn">Clear filters</button>
  </div>
</main>

<footer>Reference — a quieter place to collect what you notice.</footer>

<script>
(function(){
  const categories = ["All","Illustration","Product","Fashion","Interiors","Editorial","Type"];

  // id, title, tag/category, picsum photo id, height ratio (for masonry variety)
  const rawItems = [
    [1001,"Ink study, mid-lunge","Illustration",64,420],
    [1002,"Bodywork sketch, side profile","Product",111,300],
    [1003,"Field walk, cropped light","Fashion",22,520],
    [1004,"Cover trial, negative space","Editorial",26,440],
    [1005,"Reading corner, built-in oak","Interiors",42,380],
    [1006,"Line weight practice","Illustration",65,340],
    [1007,"Chrome and cable detail","Product",119,300],
    [1008,"Trailing scarf study","Fashion",23,470],
    [1009,"Serif trial, wide setting","Type",180,260],
    [1010,"Morning window, quiet desk","Interiors",43,410],
    [1011,"Character turnaround, ink wash","Illustration",67,500],
    [1012,"Stitched hem, close crop","Fashion",24,330],
    [1013,"Grid cover, three colors","Editorial",28,360],
    [1014,"Dial cluster, macro","Product",114,300],
    [1015,"Reading nook, second angle","Interiors",45,470],
    [1016,"Gesture set, five poses","Illustration",68,300],
    [1017,"Condensed display, poster test","Type",183,300],
    [1018,"Pleats in motion","Fashion",25,400],
    [1019,"Kitchen, low afternoon light","Interiors",48,340],
    [1020,"Panel layout, working proof","Editorial",30,420],
    [1021,"Textured brushwork study","Illustration",70,360],
    [1022,"Seat stitching, detail crop","Product",116,470],
    [1023,"Studio shelf, film stock","Interiors",49,300],
    [1024,"Slab serif, numerals only","Type",184,340],
    [1025,"Coat drape, wind study","Fashion",27,410],
    [1026,"Spot color proof","Editorial",32,300],
    [1027,"Half-tone shading test","Illustration",71,470],
    [1028,"Handle and grain, macro","Product",118,360],
    [1029,"Balcony corner, plants","Interiors",50,400],
    [1030,"Weight axis specimen","Type",186,300],
  ];

  const items = rawItems.map(([id,title,cat,pic,h])=>({
    id, title, cat,
    src:`https://picsum.photos/id/${pic}/500/${h}`,
    h,
    saved:false
  }));

  const grid = document.getElementById('grid');
  const pillsNav = document.getElementById('pills');
  const searchInput = document.getElementById('search');
  const clearBtn = document.getElementById('clearSearch');
  const savedToggle = document.getElementById('savedToggle');
  const savedCountEl = document.getElementById('savedCount');
  const resultHeading = document.getElementById('resultHeading');
  const emptyState = document.getElementById('emptyState');
  const emptyText = document.getElementById('emptyText');
  const resetBtn = document.getElementById('resetBtn');
  const sortSelect = document.getElementById('sortSelect');

  let activeCat = "All";
  let showSavedOnly = false;
  let query = "";

  categories.forEach(cat=>{
    const btn = document.createElement('button');
    btn.className = 'pill' + (cat==="All" ? " active" : "");
    btn.textContent = cat;
    btn.setAttribute('aria-pressed', cat==="All" ? "true":"false");
    btn.addEventListener('click', ()=>{
      activeCat = cat;
      [...pillsNav.children].forEach(c=>{
        c.classList.toggle('active', c===btn);
        c.setAttribute('aria-pressed', c===btn ? "true":"false");
      });
      render();
    });
    pillsNav.appendChild(btn);
  });

  function updateSavedCount(){
    const n = items.filter(i=>i.saved).length;
    savedCountEl.textContent = n;
  }

  function ticketSVG(saved){
    return saved
      ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>';
  }

  function matches(item){
    const q = query.trim().toLowerCase();
    const catOk = activeCat==="All" || item.cat===activeCat;
    const qOk = !q || item.title.toLowerCase().includes(q) || item.cat.toLowerCase().includes(q);
    const savedOk = !showSavedOnly || item.saved;
    return catOk && qOk && savedOk;
  }

  function render(){
    let list = items.filter(matches);

    if(sortSelect.value==="az"){
      list = [...list].sort((a,b)=>a.title.localeCompare(b.title));
    } else if(sortSelect.value==="tall"){
      list = [...list].sort((a,b)=>b.h-a.h);
    }

    grid.innerHTML = "";

    if(list.length===0){
      emptyState.style.display = "block";
      grid.style.display = "none";
      emptyText.textContent = showSavedOnly
        ? "You haven't saved anything in this view yet. Tap the ticket on an image to save it."
        : "No images match that search. Try a different word, or clear your filters to see everything again.";
    } else {
      emptyState.style.display = "none";
      grid.style.display = "";
      list.forEach((item, idx)=>{
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = (idx*18)+'ms';

        const img = document.createElement('img');
        img.src = item.src;
        img.alt = item.title;
        img.loading = 'lazy';
        card.appendChild(img);

        const overlay = document.createElement('div');
        overlay.className = 'card-overlay';

        const top = document.createElement('div');
        top.className = 'card-top';
        const ticket = document.createElement('button');
        ticket.className = 'ticket' + (item.saved ? ' saved':'');
        ticket.innerHTML = ticketSVG(item.saved) + (item.saved ? 'Saved' : 'Save');
        ticket.setAttribute('aria-pressed', item.saved ? 'true':'false');
        ticket.setAttribute('aria-label', (item.saved?'Remove from saved: ':'Save: ')+item.title);
        ticket.addEventListener('click', (e)=>{
          e.stopPropagation();
          item.saved = !item.saved;
          updateSavedCount();
          render();
        });
        top.appendChild(ticket);

        const bottom = document.createElement('div');
        bottom.className = 'card-bottom';
        bottom.innerHTML = `<p class="card-title">${item.title}</p><span class="card-tag">${item.cat}</span>`;

        overlay.appendChild(top);
        overlay.appendChild(bottom);
        card.appendChild(overlay);
        grid.appendChild(card);
      });
    }

    resultHeading.innerHTML = showSavedOnly
      ? `<b>${list.length}</b> saved image${list.length===1?'':'s'}`
      : `<b>${list.length}</b> image${list.length===1?'':'s'} to browse`;
  }

  searchInput.addEventListener('input', (e)=>{
    query = e.target.value;
    clearBtn.classList.toggle('show', query.length>0);
    render();
  });
  clearBtn.addEventListener('click', ()=>{
    searchInput.value = "";
    query = "";
    clearBtn.classList.remove('show');
    searchInput.focus();
    render();
  });

  savedToggle.addEventListener('click', ()=>{
    showSavedOnly = !showSavedOnly;
    savedToggle.classList.toggle('active', showSavedOnly);
    savedToggle.setAttribute('aria-pressed', showSavedOnly ? 'true':'false');
    render();
  });

  resetBtn.addEventListener('click', ()=>{
    activeCat = "All";
    showSavedOnly = false;
    query = "";
    searchInput.value = "";
    clearBtn.classList.remove('show');
    savedToggle.classList.remove('active');
    savedToggle.setAttribute('aria-pressed','false');
    [...pillsNav.children].forEach(c=>{
      c.classList.toggle('active', c.textContent==="All");
      c.setAttribute('aria-pressed', c.textContent==="All"?"true":"false");
    });
    render();
  });

  sortSelect.addEventListener('change', render);

  updateSavedCount();
  render();
})();
</script>

</body>
</html>
